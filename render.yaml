services:
  - type: web
    name: daily-dashboard
    runtime: node
    plan: free
    buildCommand: npm install && cd frontend && npx vite build
    startCommand: cd backend && node src/index.js
    envVars:
      - key: NODE_VERSION
        value: 20.11.1
      - key: PORT
        value: 10000
      - key: SESSION_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://daily-dashboard.onrender.com
      - key: GOOGLE_REDIRECT_URI
        value: https://daily-dashboard.onrender.com/api/auth/google/callback
      - key: MICROSOFT_REDIRECT_URI
        value: https://daily-dashboard.onrender.com/api/auth/microsoft/callback
